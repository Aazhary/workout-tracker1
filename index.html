<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ── CSS ANIMATIONS ────────────────────────────────────────────────────────────
        const ANIM_STYLE = `

        @keyframes legPress  { 0%,100%{transform:rotate(40deg)} 50%{transform:rotate(80deg)} }
        @keyframes legCurl   { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-60deg)} }
        @keyframes triExt    { 0%,100%{transform:rotate(-90deg)} 50%{transform:rotate(0deg)} }
        @keyframes bicCurl   { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-100deg)} }
        @keyframes crunch    { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-20deg)} }
        @keyframes plankHold { 0%,100%{opacity:1} 50%{opacity:0.5} }
        @keyframes rowPull   { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-16px)} }
        @keyframes pushDown  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(16px)} }
        @keyframes squat     { 0%,100%{transform:translateY(0) scaleY(1)} 50%{transform:translateY(14px) scaleY(0.88)} }
        @keyframes sidePlank { 0%,100%{opacity:1;transform:rotate(0deg)} 50%{opacity:0.6;transform:rotate(3deg)} }
        @keyframes rearDelt  { 0%,100%{transform:rotate(20deg)} 50%{transform:rotate(-20deg)} }
        `;

        // ── EXERCISE ANIMATIONS ───────────────────────────────────────────────────────
        const ExerciseAnim = ({ name, accent }) => {
          const s = { width: 110, height: 100, display: "block", margin: "0 auto" };
          const body = accent || "#3b82f6"; const bar = "#94a3b8";

                <rect x="25" y="56" width="60" height="12" rx="6" fill={body} opacity="0.3"/>
                <circle cx="85" cy="58" r="8" fill={body}/>

                  <line x1="35" y1="60" x2="25" y2="40" stroke={body} strokeWidth="4" strokeLinecap="round"/>

                  <line x1="75" y1="60" x2="85" y2="40" stroke={body} strokeWidth="4" strokeLinecap="round"/>

                <circle cx="15" cy="30" r="6" fill={bar}/><circle cx="95" cy="30" r="6" fill={bar}/>

                <circle cx="83" cy="54" r="8" fill={body}/>

            "Assisted Chin-Up": (

                  <line x1="68" y1="20" x2="72" y2="11" stroke={body} strokeWidth="3.5" strokeLinecap="round"/>
                </g>
              </svg>
            ),
            "Chest Fly": (
              <svg style={s} viewBox="0 0 110 100">
                <rect x="10" y="58" width="90" height="8" rx="3" fill="#334155"/>
                <rect x="25" y="48" width="60" height="12" rx="6" fill={body} opacity="0.3"/>
                <circle cx="83" cy="50" r="8" fill={body}/>
                <g style={{animation:"flyOpen 2s ease-in-out infinite", transformOrigin:"55px 52px"}}>
                  <line x1="38" y1="52" x2="18" y2="42" stroke={body} strokeWidth="4" strokeLinecap="round"/>
                  <line x1="72" y1="52" x2="92" y2="42" stroke={body} strokeWidth="4" strokeLinecap="round"/>
                </g>
              </svg>
            ),
            "Leg Press": (
              <svg style={s} viewBox="0 0 110 100">
                <rect x="5" y="30" width="50" height="50" rx="5" fill="#1e293b" stroke="#334155" strokeWidth="1.5"/>
                <circle cx="38" cy="48" r="8" fill={body}/>
                <g style={{animation:"legPress 2s ease-in-out infinite", transformOrigin:"38px 68px"}}>
                  <line x1="38" y1="68" x2="55" y2="78" stroke={body} strokeWidth="3.5" strokeLinecap="round"/>
                </g>
                <rect x="60" y="55" width="45" height="20" rx="4" fill="#334155"/>
              </svg>
            ),
            "Hack Squat": (
              <svg style={s} viewBox="0 0 110 100">
                <rect x="20" y="15" width="70" height="70" rx="5" fill="#1e293b" stroke="#334155" strokeWidth="1.5"/>
                <g style={{animation:"squat 2s ease-in-out infinite"}}>
                  <circle cx="55" cy="34" r="9" fill={body}/>

            )
          };
          return anims[name] || (
            <svg style={s} viewBox="0 0 110 100">
              <circle cx="55" cy="35" r="9" fill={body}/>
              <line x1="55" y1="44" x2="55" y2="68" stroke={body} strokeWidth="4" strokeLinecap="round"/>
            </svg>
          );
        };

        // ── 1. PROFILE CONFIG (تحديث قراءة الـ InBody والجرعة) ──────────────────
        const DEFAULT_PROFILE = { name: "أحمد", weight: 86.5, muscle: 61.6, fat: 21.4, visceralFat: 12, age: 38, dose: "Mounjaro 5mg" };

        // ── 2. WEEKLY INTENSE TWO-SET PLAN ────────────────────────────────────────────
        const DEFAULT_WORKOUTS = {
          "Upper 1": [
            { name:"Incline Chest Press", type:"reps", unit:"lb", startWeight:55, presets:[{w:55,r:12},{w:66,r:10}], muscles:"🎯 رئيسي: صدر علوي (Upper Pec)\n⚡ مساعد: كتف أمامي + ترايسبس", safety:"ضهرك ملصوق بالكرسي طول الوقت — لو ارتفع معناه الوزن تقيل", tips:["ضهرك ملصوق بالكرسي طول الوقت","نزّل ببطء 3 ثواني، ارفع بقوة","مرفقيك مش فارد 100% فوق","زاوية 30-45° — مش 90°"], cue:"📐 زاوية 45° — صدر علوي" },
            { name:"Assisted Chin-Up", type:"reps", unit:"lb", startWeight:40, presets:[{w:40,r:10},{w:40,r:10}], muscles:"🎯 رئيسي: ظهر عريض (Lats) + بايسبس\n⚡ مساعد: ظهر علوي + ساعد", safety:"متأرجحش — الحركة من الكتف مش من الوسط", tips:["الوزن المساعد أكتر = أسهل","اسحب لحد ما ذقنك فوق البار","نزّل ببطء — ده الجزء المهم"], cue:"⬆️ ظهر وبايسبس" },
            { name:"Chest Fly", type:"reps", unit:"lb", startWeight:99, presets:[{w:99,r:12},{w:110,r:12}], muscles:"🎯 رئيسي: صدر كامل (Pectoralis Major)", safety:"مرفقيك منحنيين دايماً — لو فردتهم كامل هتأذي كوعك", tips:["مرفقيك منحنيين بسيط طول الوقت","حس بالشد في منتصف الصدر"], cue:"🦋 فراشة — عزل الصدر" },
            { name:"Shoulder Press", type:"reps", unit:"lb", startWeight:17.5, presets:[{w:17.5,r:12},{w:20,r:12}], muscles:"🎯 رئيسي: كتف أمامي + كتف جانبي", safety:"وزن مأمن مهم جداً — مفصل الكتف بتاعك محتاج حماية", tips:["وزن مأمن لحماية مفصل الكتف","شد بطنك طول الوقت"], cue:"🔒 أكتاف — حماية المفصل أولى" },
            { name:"Seated Side Raises", type:"reps", unit:"kg", startWeight:10, presets:[{w:10,r:10},{w:10,r:12}], muscles:"🎯 رئيسي: كتف جانبي (Lateral Delt)", safety:"متحركش جسمك — لو بتأرجح يبقى الوزن تقيل", tips:["ارفع للجانب مش للأمام","الكوع يسبق الرسغ قليلاً"], cue:"↔️ جانبي — عرض الكتف" },
          ],
          "Lower 1": [
            { name:"Leg Press", type:"reps", unit:"kg", startWeight:40, presets:[{w:40,r:12},{w:80,r:10}], muscles:"🎯 رئيسي: كوادريسبس (Quads)\n⚡ مساعد: غلوت + هامسترينج", safety:"متقفلش ركبتك فوق — وخليها مش بتتعدى الصابع", tips:["رجليك متاعدين على العرض","انزل لـ 90 درجة بس","متقفلش ركبتك فوق"], cue:"🦵 ضغط أرجل — كوادريسبس" },
            { name:"Seated Leg Curl", type:"reps", unit:"lb", startWeight:55, presets:[{w:55,r:12},{w:60,r:12}], muscles:"🎯 رئيسي: هامسترينج (Hamstrings)", safety:"متزنكش على الجهاز — ده بيشيل الحمل من العضلة", tips:["ببطء في الرجوع — ده الجزء المهم","متزنكش على الجهاز"], cue:"🔄 هامسترينج" },
            { name:"Triceps Press", type:"reps", unit:"lb", startWeight:10, presets:[{w:10,r:12},{w:12.5,r:12}], muscles:"🎯 رئيسي: ترايسبس (Triceps)", safety:"كوعيك ثابتين — لو تحركوا يبقى الوزن تقيل", tips:["افرد الدراع كاملة","نزّل ببطء"], cue:"💪 تمديد ترايسبس" },
            { name:"Incline Biceps Curl", type:"reps", unit:"lb", startWeight:44, presets:[{w:44,r:12},{w:55,r:12}], muscles:"🎯 رئيسي: بايسبس (Biceps)", safety:"متتحركش عن الدكة — المرجحة بتضيع التمرين", tips:["الضهر مستوي على الدكة المائلة","نزّل ببطء كامل"], cue:"💪 بايسبس — أقوى عزل" },
            { name:"Abs Crunch", type:"reps", unit:"lb", startWeight:25, presets:[{w:25,r:25},{w:35,r:25}], muscles:"🎯 رئيسي: بطن علوي (إلزامي للبطن والكور)", safety:"الحركة من الأكتاف بس — لا تقم بتخطي هذا التمرين حتّى تعصر الكور", tips:["مش بترفع جسمك كله — بس الأكتاف","زفير وانت بتطلع"], cue:"🎯 بطن علوي — إلزامي" },
            { name:"Plank", type:"time", unit:null, startWeight:null, presets:[{target:"40s"},{target:"40s"}], muscles:"🎯 رئيسي: كور كامل (إلزامي للكور)", safety:"جسمك خط مستقيم تماماً — ممنوع التخطي", tips:["جسمك خط مستقيم من راسك لكعبك","بطنك جوّا طول الوقت"], cue:"⏱ ثبات 40 ثانية — إلزامي" },
          ],
          "Upper 2": [
            { name:"Flat Chest Press", type:"reps", unit:"lb", startWeight:35, presets:[{w:35,r:12},{w:45,r:10}], muscles:"🎯 رئيسي: صدر وسط (Pec Major)", safety:"نزّل لحد ما الكوع 90° بس — مش أكتر عشان القطنية", tips:["تحكم في المدى الحركي","ضهرك ملصوق بالكرسي"], cue:"📏 بنش مستوي — صدر وسط" },
            { name:"Chest Fly", type:"reps", unit:"lb", startWeight:99, presets:[{w:99,r:12},{w:110,r:12}], muscles:"🎯 رئيسي: صدر كامل", safety:"مرفقيك منحنيين دايماً", tips:["ركّز على الشد في منتصف الصدر"], cue:"🦋 فراشة — عزل الصدر" },
            { name:"T-Bar Row", type:"reps", unit:"kg", startWeight:15, presets:[{w:15,r:12},{w:30,r:10}], muscles:"🎯 رئيسي: ظهر وسط + Rhomboids", safety:"صدرك على المسند طول الوقت — لو ارتفع يبقى الوزن تقيل", tips:["صدرك على المسند طول الوقت","اسحب للحزام — مش للذقن"], cue:"🏋️ سحب T — ظهر علوي" },
            { name:"Chest Supported Row", type:"reps", unit:"lb", startWeight:35, presets:[{w:35,r:12},{w:50,r:10}], muscles:"🎯 رئيسي: ظهر وسط (Mid Back)", safety:"صدرك على الدكة مش بترفعه — ده بيحمي القطنية", tips:["مرفقيك بيجوا للخلف — مش للجانب"], cue:"🔙 سحب بمسند — ظهر وسط" },
            { name:"Seated Side Raises", type:"reps", unit:"kg", startWeight:7.5, presets:[{w:7.5,r:12},{w:10,r:12}], muscles:"🎯 رئيسي: كتف جانبي", safety:"مش بتأرجح جسمك دايماً", tips:["الكوع فوق الرسغ دايماً"], cue:"↔️ جانبي — عرض الكتف" },
            { name:"Cable Rear Delt Fly", type:"reps", unit:"lb", startWeight:12, presets:[{w:12,r:12},{w:25,r:10}], muscles:"🎯 رئيسي: كتف خلفي (Rear Delt)", safety:"الوزن مش مهم هنا — الاستشعار بالعضلة هو الهدف", tips:["انحن للأمام قليلاً","نزّل ببطء"], cue:"🔀 كتف خلفي" },
          ],
          "Lower 2": [
            { name:"Hack Squat", type:"reps", unit:"kg", startWeight:30, presets:[{w:30,r:12},{w:70,r:10}], muscles:"🎯 رئيسي: كوادريسبس + غلوت", safety:"ظهرك ملصوق بالجهاز طول الوقت — لو انفصل وقف فوراً", tips:["ظهرك ملصوق بالجهاز طول الوقت","انزل لـ 90 درجة بالظبط"], cue:"🦵 هاك سكوات — كوادريسبس + غلوت" },
            { name:"Leg Curl", type:"reps", unit:"lb", startWeight:65, presets:[{w:65,r:12},{w:65,r:12}], muscles:"🎯 رئيسي: هامسترينج", safety:"التحكم أهم من الوزن", tips:["تحكم في الحركة للأسفل","شايل ثانية فوق"], cue:"🔄 هامسترينج" },
            { name:"Triceps Pushdown", type:"reps", unit:"lb", startWeight:20, presets:[{w:20,r:12},{w:22,r:12}], muscles:"🎯 رئيسي: ترايسبس", safety:"كوعيك ثابتين جنب جسمك", tips:["افرد الدراع كاملة للأسفل"], cue:"⬇️ ترايسبس كابل" },
            { name:"Alternating Curl (Preacher)", type:"reps", unit:"kg", startWeight:7.5, presets:[{w:7.5,r:12},{w:10,r:10}], muscles:"🎯 رئيسي: بايسبس", safety:"بدون مرجحة لتفادي إجهاد الجهاز العصبي", tips:["كل دراع لوحدها","نزّل ببطء كامل"], cue:"💪 بايسبس متناوب" },
            { name:"Side Plank", type:"time", unit:null, startWeight:null, presets:[{target:"50s"},{target:"50s"}], muscles:"🎯 رئيسي: كور جانبي (إلزامي للكور)", safety:"ورك مرفوع دايماً — ممنوع التخطي", tips:["جسمك خط مستقيم","ثبات 50 ثانية لكل جنب"], cue:"⏱ ثبات 50 ثانية — إلزامي" },
            { name:"Abs Crunch", type:"reps", unit:"lb", startWeight:35, presets:[{w:35,r:25},{w:35,r:25}], muscles:"🎯 رئيسي: بطن علوي (إلزامي للبطن)", safety:"الحركة صغيرة ومركّزة لمنع التخطي وعصر العضلة", tips:["الحركة من الصدر لفوق بس","زفير وانت بتطلع"], cue:"🎯 بطن — إلزامي" },
          ],
        };

        const C = {
          "Upper 1":{ bg:"#1e3a5f", accent:"#3b82f6", emoji:"💪" },
          "Lower 1":{ bg:"#14532d", accent:"#22c55e", emoji:"🦵" },
          "Upper 2":{ bg:"#3b0764", accent:"#a855f7", emoji:"🏋️" },
          "Lower 2":{ bg:"#7c2d12", accent:"#f97316", emoji:"🔥" },
        };

        const TODAY_ISO = new Date().toISOString().split("T")[0];
        const TODAY_AR  = new Date().toLocaleDateString("ar-EG",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

        const getStorage  = () => { try{ return JSON.parse(localStorage.getItem("wt_ahmed_v4")||"[]"); }catch{ return []; } };
        const saveStorage = d  => { try{ localStorage.setItem("wt_ahmed_v4", JSON.stringify(d)); }catch{} };
        const getProfile  = () => { try{ return JSON.parse(localStorage.getItem("wt_profile")||"null"); }catch{ return null; } };
        const saveProfile = p  => { try{ localStorage.setItem("wt_profile", JSON.stringify(p)); }catch{} };
        
        const getCustomWorkouts = () => {
            try {
                const saved = localStorage.getItem("wt_custom_workouts");
                return saved ? JSON.parse(saved) : DEFAULT_WORKOUTS;
            } catch { return DEFAULT_WORKOUTS; }
        };

        const calcVolume = exercises => exercises.reduce((t,ex) => {
          if(ex.type!=="reps") return t;
          return t + ex.sets.reduce((s,set)=>s+((parseFloat(set.weight)||0)*(parseInt(set.reps)||0)),0);
        },0);

        const initSets = exercises => exercises.map(ex=>({
          name:ex.name, type:ex.type, unit:ex.unit, startWeight:ex.startWeight,
          cue:ex.cue, tips:ex.tips, muscles:ex.muscles, safety:ex.safety, video:ex.video,
          sets: (ex.presets||[{},{}]).map((pre)=>
            ex.type==="time"
              ? {duration:pre.duration||"", targetDuration:pre.target||"", done:false}
              : {weight:String(pre.w!=null?pre.w:ex.startWeight||""), unit:ex.unit||"kg", reps:String(pre.r!=null?pre.r:""), done:false}
          ),
        }));

        function buildPrompt(session, history, profile) {
          const p = profile || DEFAULT_PROFILE;
          const prev = history.filter(h=>h.workout===session.workout).slice(-2)[0] || null;
          const vol = calcVolume(session.exercises);
          const mins = session.durationMins || "—";
          const lines = [];
          lines.push(`أنا أحمد، ${p.age} سنة، مستمر على الـ ${p.dose}.`);
          lines.push("إليك التقرير البرمجي الصافي والمحدث لتمرينة اليوم، والمطلوب منك تحليله ومقارنته بالجلسة السابقة ومطابقته مع لقطات شاشة الساعة المرفقة:\n");
          lines.push("1. [بيانات الجلسة الحالية]:");
          lines.push("• اسم الجلسة: " + session.workout);
          lines.push("• التاريخ: " + session.date);
          lines.push("• الوقت الإجمالي للتمرين: " + mins + " دقيقة");
          lines.push("• إجمالي الحجم التدريبي (Total Volume): " + (vol > 0 ? vol.toLocaleString() + " (mixed kg/lb)" : "—") + "\n");
          lines.push("2. [سجل الأداء الفعلي للمجموعتين]:");
          session.exercises.forEach(ex => {
            if (ex.type === "reps") {
              const s1 = ex.sets[0]; const s2 = ex.sets[1]||{};
              const u1 = s1.unit||""; const u2 = s2.unit||u1;
              lines.push("• " + ex.name + ":");
              lines.push("  جولة 1: " + (s1.weight||"—") + u1 + " × " + (s1.reps||"—") + " عدات " + (s1.done?"✅":"⬜"));
              lines.push("  جولة 2: " + (s2.weight||"—") + u2 + " × " + (s2.reps||"—") + " عدات " + (s2.done?"✅":"⬜"));
            } else {
              lines.push("• " + ex.name + ":");
              ex.sets.forEach((s,i) => lines.push("  جولة " + (i+1) + ": " + (s.duration||"—") + " " + (s.done?"✅":"⬜")));
            }
          });
          lines.push("\n3. [بيانات الاستشفاء والساعة]:");
          lines.push("  (مرفق لقطات الشاشة للساعة بالأسفل لقراءتها وتحليل جودة النوم، الـ REM، نبضات التمرين، ومعدل التعافي).\n");
          lines.push("بناءً على هذا، أعطني: تقييم الشدة، المقارنة الدقيقة، الأوزان المقترحة للجلسة القادمة بصيغة برمجة واضحة لتحديث الخطة.");
          return lines.join("\n");
        }

        // ── SYNC FROM GEMINI SCREEN ──────────────────────────────────────────────────
        function GeminiSyncScreen({onBack}) {
            const [text, setText] = useState('');
            const [status, setStatus] = useState('');
            const handleSync = () => {
                if(!text.trim()) return;
                try {
                    const currentWorkouts = {...getCustomWorkouts()};
                    let updatedCount = 0;
                    Object.keys(currentWorkouts).forEach(workoutKey => {
                        currentWorkouts[workoutKey] = currentWorkouts[workoutKey].map(exercise => {
                            const regex = new RegExp(`${exercise.name}\\s*:\\s*(?:جولة\\s*1:\\s*)?(\\d+(?:\\.\\d+)?)\\s*(kg|lb)?\\s*×\\s*(\\d+)`, 'i');
                            const match = text.match(regex);
                            if (match) {
                                const newWeight = parseFloat(match[1]);
                                const newReps = parseInt(match[3]);
                                updatedCount++;
                                return { ...exercise, startWeight: newWeight, presets: [{w: newWeight, r: newReps}, {w: newWeight, r: newReps}] };
                            }
                            return exercise;
                        });
                    });
                    if(updatedCount > 0) {
                        localStorage.setItem("wt_custom_workouts", JSON.stringify(currentWorkouts));
                        setStatus(`✅ نجاح! تم تحديث ${updatedCount} تمرين بأوزانك الجديدة فوراً.`);
                        setTimeout(onBack, 1500);
                    } else {
                        setStatus('❌ لم يتم العثور على أوزان متطابقة. تأكد من نسخ اقتراح جمني كاملاً.');
                    }
                } catch (e) { setStatus('❌ حدث خطأ أثناء قراءة البيانات.'); }
            };
            return (
                <div class="min-h-screen text-right p-6" style={{background:"#0a0f1a"}}>
                    <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
                        <h2 class="text-xl font-bold text-blue-500">🤖 مزامنة الأوزان من Gemini</h2>
                        <button onClick={onBack} class="bg-gray-800 px-3 py-1.5 rounded-lg text-sm text-gray-400">إغلاق</button>
                    </div>
                    <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="اصق نص اقتراح الأوزان والتكرارات هنا..." class="w-full h-48 bg-gray-900 border border-gray-800 rounded-xl p-4 text-right text-sm text-white focus:outline-none focus:border-blue-500 mb-4 font-monospace" dir="rtl"></textarea>
                    {status && <div class="p-3 bg-blue-950/40 border border-blue-900 rounded-xl text-center text-sm text-blue-400 mb-4">{status}</div>}
                    <button onClick={handleSync} class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-xl font-bold text-white transition">تحديث خطة الأوزان بالموقع</button>
                </div>
            );
        }

                  <div>

        // ── PROFILE SCREEN ────────────────────────────────────────────────────────────
        function ProfileScreen({onBack}){

        // ── WORKOUT SCREEN ────────────────────────────────────────────────────────────
        function WorkoutScreen({workoutName,onFinish,onBack}){
          const c=C[workoutName]; const [data,setData]=useState(()=>initSets(getCustomWorkouts()[workoutName]));
          const [activeEx,setActiveEx]=useState(0); const startTime = useRef(Date.now());
          const [showTips, setShowTips] = useState(false); const [showAnim, setShowAnim] = useState(true);
          const [timer, setTimer] = useState({active:false,seconds:0,exIdx:null,setIdx:null});
          const [audioActivated, setAudioActivated] = useState(false);

          useEffect(()=>{ let iv; if(timer.active) iv=setInterval(()=>setTimer(t=>({...t,seconds:t.seconds+1})),1000); return()=>clearInterval(iv); },[timer.active]);

          const [rest, setRest] = useState({active:false, seconds:90});
          const restSecondsRef = useRef(90); const audioCtxRef = useRef(null);

          const initAudioContextForIOS = () => {
            try {
              if (!audioCtxRef.current || audioCtxRef.current.state === "closed") {
                audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
              }
              if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
              setAudioActivated(true);
            } catch (e) { console.log(e); }
          };

          const testBeepHandshake = () => {
             initAudioContextForIOS();
             setTimeout(() => playBeep(600, 0.1, 0.3), 50);
          };

          const playBeep = (freq, dur, vol) => {
            try {
              if (!audioCtxRef.current) return;
              const ctx = audioCtxRef.current;
              if (ctx.state === "suspended") ctx.resume();
              const osc = ctx.createOscillator(); const gain = ctx.createGain();
              osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = freq || 880;
              gain.gain.setValueAtTime(vol || 0.5, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (dur || 0.18));
              osc.start(ctx.currentTime); osc.stop(ctx.currentTime + (dur || 0.18));
            } catch(e){}
          };

          const playDone = () => {
            try {
              if (!audioCtxRef.current) return;
              const ctx = audioCtxRef.current;
              if (ctx.state === "suspended") ctx.resume();
              [[0, 880], [0.2, 1047], [0.4, 1319]].forEach(([t, freq]) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.6, ctx.currentTime + t);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.4);
                osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.45);
              });
            } catch(e){}
          };

          useEffect(() => {
            if (!rest.active) return;
            restSecondsRef.current = rest.seconds;
            const iv = setInterval(() => {
              restSecondsRef.current -= 1; const next = restSecondsRef.current;
              if (next <= 0) { clearInterval(iv); playDone(); setRest({active:false, seconds:90}); return; }
              if (next <= 10) playBeep(next <= 5 ? 1047 : 880, 0.15, 0.5);
              setRest(r => ({...r, seconds: next}));
            }, 1000);
            return () => clearInterval(iv);
          }, [rest.active]);

          const startRest = () => { initAudioContextForIOS(); restSecondsRef.current = 90; setRest({active:true, seconds:90}); };
          const update=(ei,si,field,val)=>setData(d=>d.map((ex,i)=>i!==ei?ex:{...ex,sets:ex.sets.map((s,j)=>j!==si?s:{...s,[field]:val})}));
          const toggleTimer=(ei,si)=>{ initAudioContextForIOS(); if(timer.active&&timer.exIdx===ei&&timer.setIdx===si){ update(ei,si,"duration",`${timer.seconds}s`); setTimer({active:false,seconds:0,exIdx:null,setIdx:null}); } else { setTimer({active:true,seconds:0,exIdx:ei,setIdx:si}); } };
          const handleFinish=()=>{ const h=getStorage(); const mins=Math.round((Date.now()-startTime.current)/60000); const s={date:TODAY_ISO,workout:workoutName,exercises:data,durationMins:mins}; h.push(s); saveStorage(h); onFinish(s,h); };

          const progress=data.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
          const total=data.reduce((a,ex)=>a+ex.sets.length,0);
          const pct=Math.round((progress/total)*100); const ex=data[activeEx];

          return(
            <div class="min-h-screen text-right pb-8" style={{background:"#0a0f1a"}}>
              <style>{ANIM_STYLE}</style>
              <div style={{background:c.bg,padding:"16px 16px 14px",borderBottom:`2px solid ${c.accent}33`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{textAlign:"left"}}>
                    <div style={{color:c.accent,fontWeight:800,fontSize:20}}>{pct}%</div>
                    <div style={{color:"#64748b",fontSize:11}}>{progress}/{total}</div>
                  </div>
                  <div style={{flex:1, paddingRight: 10}}>
                    <div style={{color:c.accent,fontSize:11,letterSpacing:1}}>{c.emoji} {TODAY_AR.split("،")[0]}</div>
                    <div style={{color:"#f8fafc",fontWeight:800,fontSize:18}}>{workoutName}</div>
                  </div>
                  <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"7px 11px",color:"#e2e8f0",cursor:"pointer",fontSize:15}}>→</button>
                </div>
                
                <div class="mb-3">
                   <button onClick={testBeepHandshake} class={`w-full p-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 ${audioActivated ? 'bg-green-600/20 text-green-400 border border-green-500/30' : 'bg-amber-600 text-white border border-amber-500 animate-pulse'}`}>
                      {audioActivated ? '🔊 إذن الصوت مفعل وجاهز في سفاري' : '⚠️ اضغط هنا لتفعيل واختبار الصوت في سفاري (هام)'}
                   </button>
                </div>

                <div style={{background:"rgba(255,255,255,0.1)",borderRadius:99,height:4}}><div style={{background:c.accent,borderRadius:99,height:4,width:`${pct}%`,transition:"width 0.4s"}}/></div>
                <div style={{display:"flex",gap:6,marginTop:10,overflowX:"auto",paddingBottom:2,flexDirection:"row-reverse"}}>
                  {data.map((ex,i)=>{ const done=ex.sets.every(s=>s.done); return(
                    <button key={i} onClick={()=>{initAudioContextForIOS(); setActiveEx(i); setShowTips(false); setShowAnim(true);}}
                      style={{background:i===activeEx?c.accent:done?`${c.accent}22`:"rgba(255,255,255,0.07)",border:"none",borderRadius:20,padding:"5px 11px",color:i===activeEx?"#fff":done?c.accent:"#94a3b8",cursor:"pointer",fontSize:11,whiteSpace:"nowrap",fontWeight:600,flexShrink:0}}>
                      {done?"✓ ":""}{ex.name}
                    </button>
                  );})}
                </div>
              </div>

              <div style={{padding:"14px 16px"}}>
                <div style={{background:"#1e293b",borderRadius:18,padding:16,border:`1px solid ${c.accent}22`,marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,flexDirection:"row-reverse"}}>
                    <div>
                      <h2 style={{color:"#f8fafc",fontSize:16,fontWeight:700,margin:"0 0 3px"}}>{ex.name}</h2>
                      <div style={{color:c.accent,fontSize:11,fontWeight:600}}>{ex.cue}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{initAudioContextForIOS(); setShowAnim(!showAnim);}} style={{background:showAnim?c.accent:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,padding:"6px 10px",color:"#showAnim"?"#fff":"#64748b",cursor:"pointer",fontSize:11}}>🎬</button>
                      <button onClick={()=>{initAudioContextForIOS(); setShowTips(!showTips);}} style={{background:showTips?c.accent:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,padding:"6px 10px",color:showTips?"#fff":"#64748b",cursor:"pointer",fontSize:11}}>💡</button>
                    </div>
                  </div>

                  {showAnim&&(
                    <div style={{background:"#0f172a",borderRadius:12,padding:"12px 8px",marginBottom:12,border:`1px solid ${c.accent}22`,display:"flex",justifyContent:"center"}}>
                      <ExerciseAnim name={ex.name} accent={c.accent}/>
                    </div>
                  )}

                  {showTips&&(
                    <div style={{background:"#0f172a",borderRadius:12,padding:14,marginBottom:12,border:`1px solid ${c.accent}33`}}>
                      <div style={{marginBottom:10}}>
                        <div style={{color:c.accent,fontSize:11,fontWeight:700,marginBottom:4}}>💪 العضلات المستهدفة</div>
                        <div style={{color:"#e2e8f0",fontSize:12,background:`${c.accent}11`,borderRadius:8,padding:"6px 10px"}}>{ex.muscles||"—"}</div>
                      </div>
                      <div style={{marginBottom:10}}>
                        <div style={{color:"#ef4444",fontSize:11,fontWeight:700,marginBottom:4}}>⚠️ تحذير السلامة</div>
                        <div style={{color:"#fca5a5",fontSize:12,background:"#450a0a",borderRadius:8,padding:"6px 10px"}}>{ex.safety||"—"}</div>
                      </div>
                    </div>
                  )}

                  {ex.sets.map((set,si)=>(
                    <div key={si} style={{background:set.done?`${c.accent}11`:"#0f172a",borderRadius:12,padding:12,marginBottom:8,border:`1px solid ${set.done?c.accent+"44":"#1e293b"}`}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexDirection:"row-reverse",marginBottom:8}}>
                        <span style={{color:set.done?c.accent:"#475569",fontWeight:700,fontSize:12}}>المجموعة {si+1}</span>
                        <button onClick={()=>{ update(activeEx,si,"done",!set.done); if(!set.done) startRest(); else initAudioContextForIOS(); }}
                          style={{background:set.done?c.accent:"transparent",border:`2px solid ${set.done?c.accent:"#334155"}`,borderRadius:99,width:26,height:26,cursor:"pointer",color:set.done?"#fff":"#64748b",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {set.done?"✓":"○"}
                        </button>
                      </div>
                      {ex.type==="reps"?(
                        <div style={{display:"grid",gridTemplateColumns:"1fr 68px 1fr",gap:8}}>
                          <div>
                            <div style={{color:"#475569",fontSize:9,marginBottom:4,textAlign:"center"}}>التكرار</div>
                            <input type="number" value={set.reps} onChange={e=>update(activeEx,si,"reps",e.target.value)} placeholder="0" style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"#f8fafc",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"}}/>
                          </div>
                          <div>
                            <div style={{color:"#475569",fontSize:9,marginBottom:4,textAlign:"center"}}>الوحدة</div>
                            <select value={set.unit} onChange={e=>update(activeEx,si,"unit",e.target.value)} style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 4px",color:"#94a3b8",fontSize:12,fontWeight:600,textAlign:"center",outline:"none"}}>
                              <option>kg</option><option>lb</option>
                            </select>
                          </div>
                          <div>
                            <div style={{color:"#475569",fontSize:9,marginBottom:4,textAlign:"center"}}>الوزن</div>
                            <input type="number" value={set.weight} onChange={e=>update(activeEx,si,"weight",e.target.value)} placeholder="0" style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"#f8fafc",fontSize:18,fontWeight:700,textAlign:"center",outline:"none"}}/>
                          </div>
                        </div>
                      ):(
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <div style={{flex:1,background:"#1e293b",borderRadius:10,padding:"10px",textAlign:"center"}}>
                            <span style={{color:timer.active&&timer.exIdx===activeEx&&timer.setIdx===si?c.accent:"#f8fafc",fontSize:24,fontWeight:800}}>
                              {timer.active&&timer.exIdx===activeEx&&timer.setIdx===si?`${Math.floor(timer.seconds/60)}:${String(timer.seconds%60).padStart(2,"0")}`:set.duration||"0:00"}
                            </span>
                          </div>
                          <button onClick={()=>toggleTimer(activeEx,si)} style={{background:timer.active&&timer.exIdx===activeEx&&timer.setIdx===si?"#dc2626":c.accent,border:"none",borderRadius:10,padding:"12px 14px",color:"#fff",fontSize:18}}>
                            {timer.active&&timer.exIdx===activeEx&&timer.setIdx===si?"⏹":"▶"}
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>

                {rest.active && (
                  <div style={{background:rest.seconds<=10?"#450a0a":"#1e293b", borderRadius:16, padding:"14px 20px", marginBottom:12, border:"1px solid " + (rest.seconds<=10?"#dc2626":"#334155"), display:"flex", alignItems:"center", justifyContent:"space-between", flexDirection:"row-reverse"}}>
                    <div>
                      <div style={{color:rest.seconds<=10?"#ef4444":"#64748b", fontSize:11, fontWeight:700}}>⏳ وقت الراحة</div>
                      <div style={{color:rest.seconds<=10?"#ef4444":"#f8fafc", fontSize:32, fontWeight:800}}>{Math.floor(rest.seconds/60)}:{String(rest.seconds%60).padStart(2,"0")}</div>
                    </div>
                    <button onClick={()=>{ initAudioContextForIOS(); setRest({active:false,seconds:90}); }} style={{background:"#334155",border:"none",borderRadius:10,padding:"8px 14px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>تخطي</button>
                  </div>
                )}

                <div style={{display:"flex",gap:10}}>
                  {activeEx<data.length-1
                    ?<button onClick={()=>{initAudioContextForIOS(); setActiveEx(activeEx+1); setShowTips(false); setShowAnim(true);}} style={{flex:1,background:c.accent,border:"none",borderRadius:12,padding:12,color:"#fff",fontWeight:700}}>التالي ←</button>
                    :<button onClick={()=>{initAudioContextForIOS(); handleFinish();}} style={{flex:1,background:`linear-gradient(135deg,${c.accent},#22c55e)`,border:"none",borderRadius:12,padding:12,color:"#fff",fontWeight:700}}>🏁 إنهاء وتوليد التقرير</button>
                  }
                  {activeEx>0&&<button onClick={()=>{initAudioContextForIOS(); setActiveEx(activeEx-1); setShowTips(false); setShowAnim(true);}} style={{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:12,color:"#94a3b8"}}>← السابق</button>}
                </div>
              </div>
            </div>
          );
        }

        // ── REPORT SCREEN ─────────────────────────────────────────────────────────────
        function ReportScreen({session,history,onHome}){
          const c=C[session.workout]; const [copied,setCopied]=useState(false); const profile=getProfile();
          const prompt=buildPrompt(session,history,profile); const vol=calcVolume(session.exercises);
          const prev=history.filter(h=>h.workout===session.workout).slice(-2)[0]||null;
          const prevVol=prev?calcVolume(prev.exercises):null; const volDiff=prevVol!==null?vol-prevVol:null;
          const doneSets=session.exercises.reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
          const totalSets=session.exercises.reduce((a,ex)=>a+ex.sets.length,0);

          const copyAndGo=()=>{ 
            navigator.clipboard.writeText(prompt).then(() => {
              setCopied(true); setTimeout(()=>setCopied(false),3000);
              window.open("https://gemini.google.com/", "_blank");
            }).catch(()=>{ 
              const ta=document.createElement("textarea"); ta.value=prompt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); 
              setCopied(true); setTimeout(()=>setCopied(false),3000);
              window.open("https://gemini.google.com/", "_blank");
            }); 
          };

          return(
            <div class="min-h-screen text-right pb-10" style={{background:"#0a0f1a"}}>
              <div style={{background:`linear-gradient(135deg,${c.bg},#0a0f1a)`,padding:"28px 20px 20px",textAlign:"center",borderBottom:`1px solid ${c.accent}22`}}>
                <div style={{fontSize:44,marginBottom:8}}>🏆</div>
                <h1 style={{color:"#f8fafc",fontSize:20,fontWeight:800,margin:"0 0 4px"}}>عاش يا أحمد! تم إنهاء التمرين</h1>
                <p style={{color:c.accent,fontSize:13,fontWeight:600}}>{session.workout} — {session.date}</p>
              </div>
              <div style={{padding:"16px"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                  <div style={{background:"#1e293b",borderRadius:12,padding:"12px 8px",textAlign:"center",border:"1px solid #334155"}}>
                    <div style={{color:"#475569",fontSize:10,marginBottom:4}}>المقارنة بالسابق</div>
                    <div style={{color:volDiff>0?"#22c55e":volDiff<0?"#ef4444":"#64748b",fontWeight:800,fontSize:14}}>{volDiff!==null?`${volDiff>=0?"+":""}${volDiff.toLocaleString()}`:"أول جلسة"}</div>
                  </div>
                  <div style={{background:"#1e293b",borderRadius:12,padding:"12px 8px",textAlign:"center",border:"1px solid #334155"}}>
                    <div style={{color:"#475569",fontSize:10,marginBottom:4}}>الحجم التدريبي</div>
                    <div style={{color:c.accent,fontWeight:800,fontSize:14}}>{vol>0?vol.toLocaleString():"—"}</div>
                  </div>
                  <div style={{background:"#1e293b",borderRadius:12,padding:"12px 8px",textAlign:"center",border:"1px solid #334155"}}>
                    <div style={{color:"#475569",fontSize:10,marginBottom:4}}>المجموعات</div>
                    <div style={{color:doneSets===totalSets?"#22c55e":c.accent,fontWeight:800,fontSize:14}}>{doneSets}/{totalSets}</div>
                  </div>
                </div>
                <div style={{background:"#1e293b",borderRadius:16,padding:14,marginBottom:14,border:"1px solid #334155"}}>
                  <div style={{color:"#475569",fontSize:11,fontWeight:700,marginBottom:10}}>ملخص الأداء الحالي</div>
                  {session.exercises.map((ex,i)=>{
                    const pe=prev?.exercises?.find(e=>e.name===ex.name);
                    const cb=ex.type==="reps"?ex.sets.reduce((b,s)=>Math.max(b,parseFloat(s.weight)||0),0):null;
                    const pb=pe?.type==="reps"?pe.sets.reduce((b,s)=>Math.max(b,parseFloat(s.weight)||0),0):null;
                    const diff=cb&&pb?cb-pb:null; const unit=ex.sets[0]?.unit||"kg";
                    return(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<session.exercises.length-1?"1px solid #0f172a":"none",flexDirection:"row-reverse"}}>
                        <span style={{color:"#94a3b8",fontSize:12}}>{ex.name}</span>
                        <div style={{display:"flex",gap:6,alignItems:"center",flexDirection:"row-reverse"}}>
                          {ex.type==="reps"?(<>
                            <span style={{color:"#475569",fontSize:11}}>{ex.sets.map(s=>s.reps||"?").join("/")} تكرار</span>
                            <span style={{color:c.accent,fontWeight:700,fontSize:12}}>{cb>0?`${cb}${unit}`:"—"}</span>
                            {diff!==null&&<span style={{color:diff>0?"#22c55e":diff<0?"#ef4444":"#64748b",fontSize:11,fontWeight:700}}>{diff>0?`↑${diff}`:diff<0?`↓${Math.abs(diff)}`:"="}</span>}
                          </>):(<span style={{color:c.accent,fontSize:11}}>⏱ {ex.sets.map(s=>s.duration||"?").join(" / ")}</span>)}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{background:"linear-gradient(135deg,#1e293b,#0f1f35)",borderRadius:18,padding:16,marginBottom:12,border:`1px solid ${c.accent}33`}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10,flexDirection:"row-reverse"}}>
                    <span style={{fontSize:22}}>🤖</span>
                    <div>
                      <div style={{color:"#f8fafc",fontWeight:700,fontSize:14}}>ارتباط ذكي بـ Gemini</div>
                      <div style={{color:"#475569",fontSize:11}}>تم ترك خانات الساعة بالكامل فارغة لتقوم بإرفاق الإسكرين شوت يدوياً مع الـ Prompt التلقائي منسوخاً.</div>
                    </div>
                  </div>
                  <button onClick={copyAndGo} style={{width:"100%",background:copied?"#22c55e":`linear-gradient(135deg,#3b82f6,${c.accent})`,border:"none",borderRadius:12,padding:"14px",color:"#fff",cursor:"pointer",fontSize:15,fontWeight:700}}>
                    {copied?"🚀 تم النسخ وجاري فتح جمني...":"📋 نسخ الـ Prompt والذهاب لـ Gemini"}
                  </button>
                </div>
                <button onClick={onHome} style={{width:"100%",background:"transparent",border:"1px solid #1e293b",borderRadius:12,padding:12,color:"#475569"}}>🏠 العودة للشاشة الرئيسية</button>
              </div>
            </div>
          );
        }

        // ── HISTORY SCREEN ────────────────────────────────────────────────────────────
        function HistoryScreen({onBack}){
          const [history]=useState(getStorage); const [tab,setTab]=useState("log");
          const exStats=()=>{ const s={}; history.forEach(h=>h.exercises.forEach(ex=>{ if(!s[ex.name])s[ex.name]=[]; ex.sets.forEach(set=>{if(set.weight&&set.reps)s[ex.name].push({date:h.date,weight:parseFloat(set.weight),reps:parseInt(set.reps),unit:set.unit});}); })); return s; };
          return(
            <div class="min-h-screen text-right pb-40" style={{background:"#0a0f1a"}}>
              <div style={{background:"#1e293b",padding:"16px 16px 0",borderBottom:"1px solid #334155"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <div style={{color:"#f8fafc",fontWeight:800,fontSize:18}}>📊 السجل والتحليل التراكمي</div>
                  <button onClick={onBack} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,padding:"7px 11px",color:"#e2e8f0",cursor:"pointer",fontSize:15}}>→</button>
                </div>
                <div style={{display:"flex",background:"#0a0f1a",borderRadius:10,padding:3,marginBottom:14,flexDirection:"row-reverse"}}>
                  {[["log","📋 السجل"],["analysis","📈 تحليل"]].map(([t,l])=>(
                    <button key={t} onClick={()=>setTab(t)} style={{flex:1,background:tab===t?"#3b82f6":"transparent",border:"none",borderRadius:8,padding:"7px 0",color:tab===t?"#fff":"#64748b",fontSize:12,fontWeight:600}}>{l}</button>
                  ))}
                </div>
              </div>
              <div style={{padding:16}}>
                {tab=="log"&&(history.length===0
                  ?<div style={{textAlign:"center",padding:60,color:"#475569"}}><div style={{fontSize:48}}>🏋️</div><p>لا يوجد تدريبات مسجلة بعد</p></div>
                  :[...history].reverse().map((s,i)=>{ const c=C[s.workout]||{accent:"#3b82f6",emoji:"💪"}; const vol=calcVolume(s.exercises); return(
                    <div key={i} style={{background:"#1e293b",borderRadius:14,padding:14,marginBottom:10,border:"1px solid #334155"}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexDirection:"row-reverse"}}>
                        <div><div style={{color:"#f8fafc",fontWeight:700,fontSize:14}}>{c.emoji} {s.workout}</div><div style={{color:"#64748b",fontSize:12,marginTop:2}}>{s.date}</div></div>
                        <div style={{textAlign:"left"}}>{vol>0&&<div style={{color:c.accent,fontWeight:700,fontSize:14}}>{vol.toLocaleString()}</div>}<div style={{color:"#64748b",fontSize:11}}>{s.exercises.reduce((a,ex)=>a+ex.sets.filter(x=>x.done).length,0)}/{s.exercises.reduce((a,ex)=>a+ex.sets.length,0)} جولة</div></div>
                      </div>
                    </div>
                  );})
                )}
                {tab=="analysis"&&(()=> { const stats=exStats(); const keys=Object.keys(stats); if(!keys.length) return <div style={{textAlign:"center",padding:60,color:"#475569"}}><p>سجل بعض التدريبات أولاً لرؤية التحليل المتقدم</p></div>;
                  return keys.map(name=>{ const e=stats[name]; if(!e.length) return null; const mW=Math.max(...e.map(x=>x.weight)); const aR=Math.round(e.reduce((a,x)=>a+x.reps,0)/e.length); const trend=e.length>1?(e[e.length-1].weight>e[0].weight?"📈 تحسن":e[e.length-1].weight<e[0].weight?"📉 تراجع":"➡️ ثابت"):"—";
                    return(<div key={name} style={{background:"#1e293b",borderRadius:14,padding:14,marginBottom:10,border:"1px solid #334155"}}>
                      <div style={{color:"#f8fafc",fontWeight:700,fontSize:13,marginBottom:10}}>{name}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                        {[["اتجاه الوزن",trend],["متوسط التكرار",aR],["أعلى وزن",`${mW}${e[0].unit}`]].map(([l,v])=>(
                          <div key={l} style={{background:"#0a0f1a",borderRadius:8,padding:"8px 4px",textAlign:"center"}}><div style={{color:"#475569",fontSize:9,marginBottom:3}}>{l}</div><div style={{color:"#f8fafc",fontWeight:700,fontSize:11}}>{v}</div></div>
                        ))}
                      </div>
                    </div>);
                  });
                })()}
              </div>
            </div>
          );
        }

        // ── MAIN APPLICATION CONFIG ──────────────────────────────────────────────────
        function App(){
          const[screen,setScreen]=useState("select"); const[activeWorkout,setActiveWorkout]=useState(null); const[reportData,setReportData]=useState(null);
          if(screen === "workout") return <WorkoutScreen workoutName={activeWorkout} onBack={()=>setScreen("select")} onFinish={(s,h)=>{setReportData({session:s,history:h});setScreen("report");}}/>;
          if(screen === "report") return <ReportScreen session={reportData.session} history={reportData.history} onHome={()=>setScreen("select")}/>;
          if(screen === "history") return <HistoryScreen onBack={()=>setScreen("select")}/>;
          if(screen === "__profile__") return <ProfileScreen onBack={()=>setScreen("select")}/>;
          if(screen === "__sync__") return <GeminiSyncScreen onBack={()=>setScreen("select")}/>;
          return <SelectScreen onSelect={name=>{if(name==="__history__")return setScreen("history");if(name==="__profile__")return setScreen("__profile__");if(name==="__sync__")return setScreen("__sync__");setActiveWorkout(name);setScreen("workout");}}/>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
