<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workout">
    <meta name="theme-color" content="#0a0f1a">
    <title>Workout Tracker — أحمد</title>
    
    <!-- React & Tailwind CSS via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body { background-color: #0a0f1a; color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        input, select { background-color: #111827; border: 1px solid #374151; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function WorkoutTracker() {
            // تحميل البيانات من الـ localStorage تلقائياً أو بدء قائمة فارغة
            const [workouts, setWorkouts] = useState(() => {
                const saved = localStorage.getItem('workout_data');
                return saved ? JSON.parse(saved) : [];
            });

            const [exercise, setExercise] = useState('');
            const [weight, setWeight] = useState('');
            const [sets, setSets] = useState('');
            const [reps, setReps] = useState('');

            // حفظ التعديلات فوراً عند تغيير البيانات
            useEffect(() => {
                localStorage.setItem('workout_data', JSON.stringify(workouts));
            }, [workouts]);

            const handleAddWorkout = (e) => {
                e.preventDefault();
                if (!exercise || !weight || !sets || !reps) return;

                const newWorkout = {
                    id: Date.now(),
                    exercise,
                    weight: parseFloat(weight),
                    sets: parseInt(sets),
                    reps: parseInt(reps),
                    date: new Date().toLocaleDateString('ar-EG')
                };

                setWorkouts([newWorkout, ...workouts]);
                setExercise('');
                setWeight('');
                setSets('');
                setReps('');
            };

            const handleDelete = (id) => {
                setWorkouts(workouts.filter(w => w.id !== id));
            };

            return (
                <div class="max-w-2xl mx-auto space-y-6">
                    <header class="text-center py-4 border-b border-gray-800">
                        <h1 class="text-3xl font-bold text-blue-500">متابع التمارين الذكي 💪</h1>
                        <p class="text-gray-400 text-sm mt-1">يتم حفظ البيانات تلقائياً على جهازك</p>
                    </header>

                    {/* نموذج إضافة تمرين */}
                    <form onSubmit={handleAddWorkout} class="bg-gray-900 p-6 rounded-xl shadow-lg border border-gray-800 space-y-4">
                        <h2 class="text-xl font-semibold mb-2">إضافة تمرين جديد</h2>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">اسم التمرين</label>
                            <input type="text" value={exercise} onChange={e => setExercise(e.target.value)} placeholder="مثال: Chest Press, Squat" class="w-full p-2.5 rounded-lg focus:outline-none focus:border-blue-500" required />
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">الوزن (كجم)</label>
                                <input type="number" step="0.1" value={weight} onChange={e => setWeight(e.target.value)} placeholder="91.7" class="w-full p-2.5 rounded-lg focus:outline-none focus:border-blue-500" required />
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">المجموعات</label>
                                <input type="number" value={sets} onChange={e => setSets(e.target.value)} placeholder="4" class="w-full p-2.5 rounded-lg focus:outline-none focus:border-blue-500" required />
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">التكرارات</label>
                                <input type="number" value={reps} onChange={e => setReps(e.target.value)} placeholder="12" class="w-full p-2.5 rounded-lg focus:outline-none focus:border-blue-500" required />
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-3 rounded-lg transition duration-200 mt-2">تسجيل التمرين</button>
                    </form>

                    {/* عرض التمارين المسجلة */}
                    <div class="space-y-3">
                        <h3 class="text-xl font-semibold px-1">السجل الحالي ({workouts.length})</h3>
                        {workouts.length === 0 ? (
                            <p class="text-gray-500 text-center py-8 bg-gray-950 rounded-xl border border-dashed border-gray-800">لا توجد تمارين مسجلة بعد. ابدأ بإضافة تمرينك الأول!</p>
                        ) : (
                            workouts.map(w => (
                                <div key={w.id} class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex justify-between items-center shadow-sm">
                                    <div class="space-y-1">
                                        <h4 class="text-lg font-bold text-white">{w.exercise}</h4>
                                        <p class="text-sm text-gray-400">
                                            {w.sets} مجموعات × {w.reps} تكرار <span class="mx-1 text-gray-600">|</span> <span class="text-blue-400 font-medium">{w.weight} كجم</span>
                                        </p>
                                        <span class="text-xs text-gray-500 block">{w.date}</span>
                                    </div>
                                    <button onClick={() => handleDelete(w.id)} class="text-red-500 hover:text-red-400 p-2 text-sm bg-red-950/30 hover:bg-red-950/60 rounded-lg transition">حذف</button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WorkoutTracker />);
    </script>
</body>
</html>
